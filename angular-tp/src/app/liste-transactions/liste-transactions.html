<div class="listeTransactions">
    <h2>Liste des transactions</h2>

    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background-color: #ecf0f1; cursor: pointer;">
                <th (click)="trier('id')" class="tri">ID ↕</th>
                <th (click)="trier('amount')" class="tri">amount ↕</th>
                <th (click)="trier('balance')" class="tri">balance ↕</th>
                <th (click)="trier('label')" class="tri">label ↕</th>
                <th (click)="trier('date')" class="tri">date ↕</th>
            </tr>
        </thead>



        <tbody>
            @for (t of transactions(); track t.id) {
            <tr [routerLink]="['/detail', t.id]" style="cursor: pointer; border-bottom: 1px solid #eee;">
                <td style="padding: 10px;">{{ t.id }}</td>
                <td style="padding: 10px;">{{ t.amount | currency:'EUR':'symbol':'1.2-2' }}</td>
                <td style="padding: 10px;">{{ t.balance | currency:'EUR':'symbol':'1.2-2' }}</td>
                <td style="padding: 10px;">{{ t.label }}</td>
                <td style="padding: 10px;">{{ t.date | date:'dd/MM/yyyy' }}</td>

            </tr>
            }
        </tbody>
    </table>
</div>
